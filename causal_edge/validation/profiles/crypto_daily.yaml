# Abel Proof profile: Crypto Daily
# For cryptocurrency strategies on daily timeframes.
# Annualized daily return vol > 60% typically triggers auto-detection to this profile.
# Three leverage-invariant dimensions: ratio (Lo-adj) × rank (IC) × shape (Omega).
# No known transformation improves all three simultaneously except genuine signal improvement.

name: crypto_daily
description: >
  Profile for daily-frequency cryptocurrency strategies. Uses Lo-adjusted Sharpe
  as the optimization target. IC guardrail catches prediction degradation.
  Omega guardrail catches clipping and distribution manipulation.
  MaxDD is an absolute gate threshold (not in triangle — scales with leverage).

metric_triangle:
  optimize: lo_adjusted_sharpe
  guardrails:
    - {metric: ic, tolerance: 0.005}
    - {metric: omega, tolerance: 0.10}         # catches clipping (distribution shape space)

anti_gaming:
  pnl_floor: 1.0
  max_dd_gate: -0.25                           # absolute gate (not relative comparison)
  sharpe_lo_ratio_max: 2.5
  ic_min: 0.02
  ic_stability_min: 0.50

validation:
  dsr_min: 0.90
  dsr_K: 300
  pbo_max: 0.10
  oos_is_min: 0.50
  neg_roll_frac_max: 0.15
  max_loss_years: 2
  lo_adjusted_min: 1.0
  omega_min: 1.0
  max_dd: -0.20
  permutation_trials: 200
  permutation_p_max: 0.01
  look_ahead_mag_corr_max: 0.10
  look_ahead_hit_rate_max: 0.90
